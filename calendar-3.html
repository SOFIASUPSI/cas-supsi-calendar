<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pianificatore CAS SUPSI</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#f4f4f4;padding:16px}
#W{max-width:960px;margin:0 auto;background:#fff;border-radius:10px;padding:16px;box-shadow:0 2px 8px rgba(0,0,0,0.08)}
.hdr{background:#151a41;border-radius:8px;padding:12px 16px;margin-bottom:11px}
.nav{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.nbtn{background:#fff;border:1px solid #ccc;border-radius:6px;padding:5px 16px;cursor:pointer;font-size:14px;font-family:Arial,sans-serif;color:#222}
.nbtn:hover{background:#f0f0f0}
.cbar{display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin-bottom:12px}
.cbtn{font-size:11px;padding:4px 10px;border-radius:6px;cursor:pointer;font-family:Arial,sans-serif}
.cal-row{display:flex;gap:20px;flex-wrap:wrap;margin-bottom:12px}
.cal{flex:1;min-width:252px}
.cal-title{font-size:12px;font-weight:bold;color:#222;text-align:center;margin-bottom:6px;padding-bottom:5px;border-bottom:1px solid #ddd}
.wk-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:2px}
.dh{text-align:center;font-size:9px;padding:2px 0}
.dc{height:46px;border-radius:4px;display:flex;flex-direction:column;align-items:center;justify-content:space-between;padding:4px 2px;cursor:pointer}
.dc:hover{filter:brightness(0.88)}
.dc.empty{visibility:hidden;cursor:default;pointer-events:none}
.sgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:8px;margin-bottom:10px}
.hl{background:#f5f5f5;border-radius:8px;padding:10px 14px}
.sbar{display:flex;align-items:center;gap:10px;margin-bottom:10px;padding:7px 12px;background:#f0f7ff;border:1px solid #b5d4f4;border-radius:6px;font-size:11px;color:#0C447C}
.sdot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
</style>
</head>
<body>
<div id="W">
  <div class="hdr">
    <p style="color:white;font-size:14px;font-weight:bold;margin-bottom:3px">Pianificatore CAS SUPSI - Calendario condiviso</p>
    <p style="color:rgba(255,255,255,0.6);font-size:11px">Seleziona un corso e clicca su un giorno per assegnare o rimuovere una data - le modifiche sono visibili a tutti</p>
  </div>
  <div class="sbar">
    <span class="sdot" id="sdot" style="background:#888"></span>
    <span id="smsg">Connessione in corso...</span>
    <button onclick="doRefresh()" style="font-size:11px;padding:3px 10px;border-radius:4px;border:1px solid #b5d4f4;background:#fff;cursor:pointer;color:#0C447C;margin-left:auto">&#8635; Aggiorna</button>
    <button onclick="doReset()" style="font-size:11px;padding:3px 10px;border-radius:4px;border:1px solid #ccc;background:#fff;cursor:pointer;color:#c00">Azzera tutto</button>
  </div>
  <div class="nav">
    <button class="nbtn" onclick="goNav(-1)">&laquo; Prec</button>
    <span style="flex:1;text-align:center;font-size:13px;font-weight:bold;color:#222" id="nlbl"></span>
    <button class="nbtn" onclick="goNav(1)">Succ &raquo;</button>
  </div>
  <div class="cbar" id="cbar"></div>
  <div class="cal-row" id="calrow"></div>
  <div class="sgrid" id="sgrid"></div>
  <div class="hl" id="hleg"></div>
</div>
<script>
var AKEY="$2a$10$9vktGCiQetcYmeUugA5S5eCPO.AOJdWfdVK54l2gjuvnvVRrbRAz6";
var BID="69e5f6d736566621a8d1013a";

var C=[
  {id:"TMB",  name:"CAS TMB",        c:"#378ADD",c50:"#E6F1FB",c800:"#0C447C"},
  {id:"TMA",  name:"CAS TMA",        c:"#EF9F27",c50:"#FAEEDA",c800:"#633806"},
  {id:"MSK",  name:"CAS MSK",        c:"#1D9E75",c50:"#E1F5EE",c800:"#085041"},
  {id:"ANGIO",name:"CAS Angiologia", c:"#7F77DD",c50:"#EEEDFE",c800:"#26215C"},
  {id:"SF",   name:"CAS Sal. Femm.", c:"#D4537E",c50:"#FBEAF0",c800:"#4B1528"}
];
var MN=["Gennaio","Febbraio","Marzo","Aprile","Maggio","Giugno","Luglio","Agosto","Settembre","Ottobre","Novembre","Dicembre"];
var DN=["Lu","Ma","Me","Gi","Ve","Sa","Do"];
var HT={
  autumn:    {label:"Vacanze autunnali",  bg:"#FAEEDA",bc:"#EF9F27",tc:"#633806"},
  christmas: {label:"Natale / Capodanno", bg:"#FCEBEB",bc:"#E24B4A",tc:"#501313"},
  carnival:  {label:"Carnevale",          bg:"#EEEDFE",bc:"#7F77DD",tc:"#26215C"},
  easter:    {label:"Pasqua",             bg:"#EAF3DE",bc:"#639922",tc:"#173404"},
  summer:    {label:"Estate",             bg:"#FAEEDA",bc:"#EF9F27",tc:"#633806"},
  it_hol:    {label:"Festivita italiana", bg:"#E6F1FB",bc:"#378ADD",tc:"#0C447C"}
};
var HR=[
  {t:"autumn",   s:new Date(2026,9,12), e:new Date(2026,9,23)},
  {t:"christmas",s:new Date(2026,11,21),e:new Date(2027,0,7)},
  {t:"carnival", s:new Date(2027,1,26), e:new Date(2027,2,6)},
  {t:"easter",   s:new Date(2027,2,25), e:new Date(2027,3,5)},
  {t:"summer",   s:new Date(2027,5,28), e:new Date(2027,7,16)},
  {t:"autumn",   s:new Date(2027,9,11), e:new Date(2027,9,22)},
  {t:"christmas",s:new Date(2027,11,20),e:new Date(2028,0,8)},
  {t:"carnival", s:new Date(2028,1,22), e:new Date(2028,2,2)},
  {t:"easter",   s:new Date(2028,3,13), e:new Date(2028,3,22)},
  {t:"summer",   s:new Date(2028,5,29), e:new Date(2028,7,17)},
  {t:"autumn",   s:new Date(2028,9,14), e:new Date(2028,9,25)},
  {t:"christmas",s:new Date(2028,11,21),e:new Date(2029,0,7)}
];
var ITH={};
[2026,2027,2028,2029].forEach(function(y){
  ITH[y+"-4-25"]="25 apr - Festa della Liberazione";
  ITH[y+"-6-2"] ="2 giu - Festa della Repubblica";
});

var vy=2026,vm=8,ac="TMB",busy=false;
var days={};
C.forEach(function(c){days[c.id]={};});

function st(col,msg){
  document.getElementById("sdot").style.background=col;
  document.getElementById("smsg").textContent=msg;
}

async function load(){
  st("#888","Caricamento...");
  try{
    var r=await fetch("https://api.jsonbin.io/v3/b/"+BID+"/latest",{headers:{"X-Master-Key":AKEY}});
    var d=await r.json();
    if(d.record&&d.record.days){
      C.forEach(function(c){if(d.record.days[c.id])days[c.id]=d.record.days[c.id];});
    }
    var tot=C.reduce(function(a,c){return a+Object.keys(days[c.id]).length;},0);
    st("#1D9E75",tot>0?"Caricati "+tot+" giorni":"Nessun dato - inizia ad assegnare le date");
  }catch(e){st("#E24B4A","Errore connessione");}
  render();
}

async function save(){
  if(busy)return;
  busy=true;
  st("#EF9F27","Salvataggio...");
  try{
    var r=await fetch("https://api.jsonbin.io/v3/b/"+BID,{
      method:"PUT",
      headers:{"Content-Type":"application/json","X-Master-Key":AKEY},
      body:JSON.stringify({days:days})
    });
    if(r.ok){
      var now=new Date();
      var ts=now.getDate()+"/"+(now.getMonth()+1)+"/"+now.getFullYear()+" "+now.getHours()+":"+String(now.getMinutes()).padStart(2,"0");
      st("#1D9E75","Salvato - "+ts);
    }else{st("#E24B4A","Errore salvataggio");}
  }catch(e){st("#E24B4A","Errore: "+e.message);}
  busy=false;
}

async function doRefresh(){
  C.forEach(function(c){days[c.id]={};});
  await load();
}

async function doReset(){
  if(!confirm("Cancellare tutti i dati per tutti? Non e' reversibile."))return;
  C.forEach(function(c){days[c.id]={};});
  render();
  await save();
}

function ght(d){for(var i=0;i<HR.length;i++){if(d>=HR[i].s&&d<=HR[i].e)return HR[i].t;}return null;}
function ith(d){return ITH[d.getFullYear()+"-"+(d.getMonth()+1)+"-"+d.getDate()]||null;}
function dk(d){return d.getFullYear()+"-"+(d.getMonth()+1)+"-"+d.getDate();}
function isW(d){return d.getDay()===6||d.getDay()===0;}

async function dayClick(key){
  if(days[ac][key]!==undefined){delete days[ac][key];}
  else{days[ac][key]=1;}
  render();
  await save();
}

function goNav(n){
  vm+=n;
  if(vm>11){vm-=12;vy++;}
  if(vm<0){vm+=12;vy--;}
  if(vy<2026||(vy===2026&&vm<8)){vy=2026;vm=8;}
  if(vy>2028||(vy===2028&&vm>11)){vy=2028;vm=11;}
  render();
}

function setAc(cid){ac=cid;render();}

function buildWeeks(y,m){
  var first=new Date(y,m,1),last=new Date(y,m+1,0);
  var sd=(first.getDay()+6)%7,arr=[];
  for(var i=0;i<sd;i++)arr.push(null);
  for(var dd=1;dd<=last.getDate();dd++)arr.push(new Date(y,m,dd));
  while(arr.length%7!==0)arr.push(null);
  var wks=[];
  for(var i=0;i<arr.length;i+=7)wks.push(arr.slice(i,i+7));
  return wks;
}

function rdDay(d){
  if(!d)return'<div class="dc empty"></div>';
  var key=dk(d);
  var ht=ght(d),hi=ht?HT[ht]:null;
  var ih=ith(d);
  var wknd=isW(d);
  var asgnd=C.filter(function(c){return days[c.id][key]!==undefined;});
  var isSum=d.getMonth()===6||d.getMonth()===7;
  var bg,bord="";
  if(asgnd.length===1)bg=asgnd[0].c50;
  else if(asgnd.length>1)bg="#e8e8e8";
  else if(hi)bg=hi.bg;
  else if(ih)bg=HT.it_hol.bg;
  else if(wknd)bg="#f0f0f0";
  else bg="#fff";
  if(asgnd.length===0){
    if(hi)bord="border-top:2px solid "+hi.bc+";";
    else if(ih)bord="border-top:2px solid "+HT.it_hol.bc+";";
    else if(isSum)bord="border-top:2px solid #EF9F27;";
  }
  var tips=[];
  if(asgnd.length>0)asgnd.forEach(function(c){tips.push(c.name);});
  if(ih)tips.push(ih);
  else if(hi)tips.push("Periodo critico: "+hi.label);
  else if(isSum)tips.push("Estate");
  var title=tips.length>0?tips.join(" - "):"Clicca per assegnare";
  var nc=wknd?"#222":(ih?"#0C447C":"#888");
  var nw=(wknd||ih)?"bold":"normal";
  var h='<div class="dc" onclick="dayClick(\''+key+'\')" title="'+title+'" style="background:'+bg+';'+bord+'">';
  h+='<span style="font-size:11px;font-weight:'+nw+';color:'+nc+'">'+d.getDate()+'</span>';
  if(asgnd.length>0){
    h+='<div style="display:flex;gap:2px;justify-content:center;flex-wrap:wrap">';
    asgnd.forEach(function(c){
      h+='<span style="font-size:8px;font-weight:bold;color:white;background:'+c.c+';border-radius:3px;padding:0 3px;line-height:13px" title="'+c.name+'">&#9679;</span>';
    });
    h+='</div>';
  }else if(ih){
    h+='<div style="width:5px;height:5px;border-radius:50%;background:#378ADD"></div>';
  }else{
    h+='<div style="height:13px"></div>';
  }
  h+='</div>';
  return h;
}

function render(){
  var m2=vm+1>11?vm-11:vm+1,y2=vm+1>11?vy+1:vy;
  document.getElementById("nlbl").textContent=MN[vm]+" "+vy+" - "+MN[m2]+" "+y2;
  var cb=document.getElementById("cbar");
  cb.innerHTML=C.map(function(c){
    var isA=c.id===ac,cnt=Object.keys(days[c.id]).length;
    return '<button class="cbtn" onclick="setAc(\''+c.id+'\')" style="border:2px solid '+(isA?c.c:'#ccc')+';background:'+(isA?c.c50:'#fff')+';color:'+(isA?c.c800:'#666')+'">'+c.name+(cnt>0?' ('+cnt+')':'')+'</button>';
  }).join("");
  var cr=document.getElementById("calrow");cr.innerHTML="";
  [[vy,vm],[y2,m2]].forEach(function(p){
    var y=p[0],m=p[1],wks=buildWeeks(y,m);
    var h='<div class="cal"><div class="cal-title">'+MN[m]+' '+y+'</div><div class="wk-grid">';
    DN.forEach(function(n,i){h+='<div class="dh" style="color:'+(i>=5?"#555":"#aaa")+';font-weight:'+(i>=5?"bold":"normal")+'">'+n+'</div>';});
    h+='</div>';
    wks.forEach(function(wk){h+='<div class="wk-grid">';wk.forEach(function(d){h+=rdDay(d);});h+='</div>';});
    h+='</div>';
    cr.innerHTML+=h;
  });
  document.getElementById("sgrid").innerHTML=C.map(function(c){
    var ks=Object.keys(days[c.id]).sort(),cnt=ks.length,range="Nessun giorno assegnato";
    if(cnt>0){var f=ks[0].split("-"),l=ks[cnt-1].split("-");range=f[2]+"/"+f[1]+"/"+f[0]+" &rarr; "+l[2]+"/"+l[1]+"/"+l[0];}
    return '<div style="background:#fff;border:1px solid #ddd;border-top:3px solid '+c.c+';border-radius:6px;padding:9px 12px">'+
      '<div style="font-size:11px;font-weight:bold;color:#222;margin-bottom:3px">'+c.name+'</div>'+
      '<div style="font-size:10px;color:#555;margin-bottom:2px">'+range+'</div>'+
      '<div style="font-size:10px;color:#888">'+cnt+' giorni assegnati</div></div>';
  }).join("");
}

var hl=document.getElementById("hleg"),seen={};
var pills=["autumn","christmas","carnival","easter","summer","it_hol"].filter(function(k){if(!seen[HT[k].label]){seen[HT[k].label]=1;return true;}return false;}).map(function(k){var h=HT[k];return'<span style="font-size:10px;padding:2px 8px;background:'+h.bg+';color:'+h.tc+';border:1px solid '+h.bc+';border-radius:4px">'+h.label+'</span>';}).join("");
hl.innerHTML='<div style="font-size:11px;font-weight:bold;color:#555;margin-bottom:5px">Legenda periodi critici</div><div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:6px">'+pills+'</div><p style="font-size:10px;color:#555;margin-bottom:3px">Festivita italiane: <b>25 aprile</b> - Festa della Liberazione | <b>2 giugno</b> - Festa della Repubblica</p><p style="font-size:10px;color:#999;font-style:italic">Pasqua 2027: 28 marzo - Pasqua 2028: 16 aprile - Periodi Ticino: date indicative</p>';

window.dayClick=dayClick;window.goNav=goNav;window.setAc=setAc;window.doRefresh=doRefresh;window.doReset=doReset;
load();
</script>
</body>
</html>
